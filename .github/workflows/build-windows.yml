name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: voxelcraft-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Validate V2 world and export Windows x64
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate menu, terrain, spawn, and export
        shell: bash
        run: bash ci/build_v2.sh

      - name: Upload playable Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxelCraftSurvival-Windows-x64
          path: build/VoxelCraftSurvival-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VoxelCraft-V2-Validation-Logs
          path: |
            build/import.log
            build/menu.log
            build/world.log
            build/export.log
          if-no-files-found: warn
          retention-days: 14

      - name: Publish tagged build to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/VoxelCraftSurvival-Windows-x64.zip \
            --title "VoxelCraft Survival ${GITHUB_REF_NAME}" \
            --generate-notes
