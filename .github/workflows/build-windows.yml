name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: voxelcraft-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  VOXEL_TOOLS_TAG: v1.6
  GODOT_EDITOR_ARCHIVE: godot.linuxbsd.editor.x86_64.zip
  GODOT_EDITOR_SHA256: 98e2ead648590ae135d2f162e225433d15d17c84ff90a4b41384c4b1f4bcf6ae
  WINDOWS_TEMPLATE_ARCHIVE: godot.windows.template_release.x86_64.exe.zip
  WINDOWS_TEMPLATE_SHA256: 9556c3893a07f39451c654789e16a057eec3d344428044b0d3e7ed44ae905857
  PROJECT_ARCHIVE_SHA256: 95683529d9a0bf297735280d4e16ff7eb438aa315e26972275db8745beb14b41

jobs:
  build-windows:
    name: Validate world and export Windows x64
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct and verify V2 project
        id: project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/project build
          cat source/v2/part-*.b64 | tr -d '\r\n' | base64 --decode > .ci/vcgame-v2.tar.gz
          echo "${PROJECT_ARCHIVE_SHA256}  .ci/vcgame-v2.tar.gz" | sha256sum --check
          tar -xzf .ci/vcgame-v2.tar.gz -C .ci/project
          project_dir="$(realpath .ci/project)"
          test -f "${project_dir}/project.godot"
          test -f "${project_dir}/scripts/world/world_generator.gd"
          test -f "${project_dir}/scripts/player/player_controller.gd"
          echo "dir=${project_dir}" >> "${GITHUB_OUTPUT}"
          echo "Project directory: ${project_dir}"

      - name: Download pinned Voxel Tools engine and Windows template
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/engine .ci/template
          base_url="https://github.com/Zylann/godot_voxel/releases/download/${VOXEL_TOOLS_TAG}"

          curl --fail --location --retry 5 --retry-all-errors \
            --output ".ci/${GODOT_EDITOR_ARCHIVE}" \
            "${base_url}/${GODOT_EDITOR_ARCHIVE}"

          curl --fail --location --retry 5 --retry-all-errors \
            --output ".ci/${WINDOWS_TEMPLATE_ARCHIVE}" \
            "${base_url}/${WINDOWS_TEMPLATE_ARCHIVE}"

          echo "${GODOT_EDITOR_SHA256}  .ci/${GODOT_EDITOR_ARCHIVE}" | sha256sum --check
          echo "${WINDOWS_TEMPLATE_SHA256}  .ci/${WINDOWS_TEMPLATE_ARCHIVE}" | sha256sum --check
          unzip -q ".ci/${GODOT_EDITOR_ARCHIVE}" -d .ci/engine
          unzip -q ".ci/${WINDOWS_TEMPLATE_ARCHIVE}" -d .ci/template

      - name: Locate custom engine binaries
        id: binaries
        shell: bash
        run: |
          set -euo pipefail
          godot_bin="$(find .ci/engine -type f -name 'godot*' ! -name '*.zip' -print -quit)"
          template_bin="$(find .ci/template -type f -iname '*.exe' -print -quit)"

          if [[ -z "${godot_bin}" || ! -f "${godot_bin}" ]]; then
            echo "Custom Godot editor was not found." >&2
            find .ci/engine -maxdepth 4 -type f -print >&2
            exit 1
          fi
          if [[ -z "${template_bin}" || ! -f "${template_bin}" ]]; then
            echo "Windows export template was not found." >&2
            find .ci/template -maxdepth 4 -type f -print >&2
            exit 1
          fi

          chmod +x "${godot_bin}"
          echo "godot=$(realpath "${godot_bin}")" >> "${GITHUB_OUTPUT}"
          echo "template=$(realpath "${template_bin}")" >> "${GITHUB_OUTPUT}"

      - name: Configure pinned Windows export template
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.project.outputs.dir }}
          TEMPLATE_PATH: ${{ steps.binaries.outputs.template }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os

          preset = Path(os.environ["PROJECT_DIR"]) / "export_presets.cfg"
          text = preset.read_text(encoding="utf-8")
          template = os.environ["TEMPLATE_PATH"].replace("\\", "/").replace('"', '\\"')
          marker = 'custom_template/release=""'
          replacement = f'custom_template/release="{template}"'
          if marker not in text:
              raise SystemExit("custom_template/release marker was not found")
          preset.write_text(text.replace(marker, replacement, 1), encoding="utf-8")
          PY

      - name: Import every Godot resource
        shell: bash
        run: |
          set +e
          "${{ steps.binaries.outputs.godot }}" \
            --headless \
            --path "${{ steps.project.outputs.dir }}" \
            --import > build/import.log 2>&1
          exit_code=$?
          set -e
          cat build/import.log
          if grep -Eqi 'SCRIPT ERROR|Parse Error|Failed to load script|Invalid call|Invalid assignment|Cannot get class' build/import.log; then
            echo "Script or resource import errors were detected." >&2
            exit 1
          fi
          if [[ "${exit_code}" -ne 0 ]]; then
            exit "${exit_code}"
          fi

      - name: Verify main menu boot
        shell: bash
        run: |
          set +e
          "${{ steps.binaries.outputs.godot }}" \
            --headless \
            --path "${{ steps.project.outputs.dir }}" \
            --quit-after 8 > build/menu.log 2>&1
          exit_code=$?
          set -e
          cat build/menu.log
          if grep -Eqi 'SCRIPT ERROR|Parse Error|Failed to load script|Invalid call|Invalid assignment|Cannot get class' build/menu.log; then
            echo "Main-menu runtime errors were detected." >&2
            exit 1
          fi
          if ! grep -q 'VOXELCRAFT_BOOT_OK' build/menu.log; then
            echo "The V2 main menu never reached its boot marker." >&2
            exit 1
          fi
          if [[ "${exit_code}" -ne 0 ]]; then
            exit "${exit_code}"
          fi

      - name: Generate a real world and verify surface spawn
        shell: bash
        run: |
          set +e
          "${{ steps.binaries.outputs.godot }}" \
            --headless \
            --path "${{ steps.project.outputs.dir }}" \
            --quit-after 5400 \
            -- --vc-smoke-world > build/world.log 2>&1
          exit_code=$?
          set -e
          cat build/world.log
          if grep -Eqi 'SCRIPT ERROR|Parse Error|Failed to load script|Invalid call|Invalid assignment|Cannot get class' build/world.log; then
            echo "World-generation runtime errors were detected." >&2
            exit 1
          fi
          if ! grep -q 'VOXELCRAFT_WORLD_READY' build/world.log; then
            echo "The terrain did not mesh around the calculated surface spawn." >&2
            exit 1
          fi
          if [[ "${exit_code}" -ne 0 ]]; then
            exit "${exit_code}"
          fi

      - name: Export playable Windows build
        shell: bash
        run: |
          set +e
          mkdir -p build/windows
          "${{ steps.binaries.outputs.godot }}" \
            --headless \
            --path "${{ steps.project.outputs.dir }}" \
            --export-release "Windows Desktop" \
            "${GITHUB_WORKSPACE}/build/windows/VoxelCraftSurvival.exe" > build/export.log 2>&1
          exit_code=$?
          set -e
          cat build/export.log
          if grep -Eqi 'SCRIPT ERROR|Parse Error|Failed to load script|Invalid call|Invalid assignment|Cannot get class' build/export.log; then
            echo "Export-time script errors were detected." >&2
            exit 1
          fi
          if [[ "${exit_code}" -ne 0 ]]; then
            exit "${exit_code}"
          fi
          test -s build/windows/VoxelCraftSurvival.exe

      - name: Package player build
        shell: bash
        run: |
          set -euo pipefail
          cat > build/windows/README.txt <<'TXT'
          VOXELCRAFT SURVIVAL V2 — WINDOWS X64

          Extract this ZIP, then open VoxelCraftSurvival.exe.

          Controls:
          WASD move | Mouse look | Space jump | Shift sprint | Ctrl crouch
          Left click mine/attack | Right click place | 1-9 hotbar
          E inventory/crafting | F eat/use | Escape pause

          The executable is unsigned. Windows SmartScreen may show an
          unknown-publisher warning for this development build.
          TXT

          cd build/windows
          zip -9 ../VoxelCraftSurvival-Windows-x64.zip VoxelCraftSurvival.exe README.txt

      - name: Upload playable Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxelCraftSurvival-Windows-x64
          path: build/VoxelCraftSurvival-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VoxelCraft-V2-Validation-Logs
          path: |
            build/import.log
            build/menu.log
            build/world.log
            build/export.log
          if-no-files-found: warn
          retention-days: 14

      - name: Publish tagged build to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/VoxelCraftSurvival-Windows-x64.zip \
            --title "VoxelCraft Survival ${GITHUB_REF_NAME}" \
            --generate-notes
