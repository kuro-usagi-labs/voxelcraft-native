name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: voxelcraft-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Validate V3 world and export Windows x64
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify V3 source chunks
        shell: bash
        run: bash ci/check_v3_chunks.sh

      - name: Validate scripts, menu, terrain, spawn, and export
        shell: bash
        run: |
          mkdir -p build
          set -o pipefail
          bash ci/build_v2.sh 2>&1 | tee build/pipeline.log

      - name: Post failure diagnostics to pull request
        if: failure() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '### V3 CI failure diagnostics'
            echo
            echo '```text'
            if [[ -f build/pipeline.log ]]; then
              tail -n 120 build/pipeline.log
            elif [[ -f build/patch.log ]]; then
              cat build/patch.log
            else
              echo 'No pipeline log was produced.'
            fi
            echo '```'
          } > /tmp/v3-ci-comment.md
          gh pr comment "${PR_NUMBER}" --body-file /tmp/v3-ci-comment.md

      - name: Upload playable Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxelCraftSurvival-Windows-x64
          path: build/VoxelCraftSurvival-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VoxelCraft-V3-Validation-Logs
          path: |
            build/patch.log
            build/pipeline.log
            build/import.log
            build/menu.log
            build/world.log
            build/export.log
          if-no-files-found: warn
          retention-days: 14

      - name: Publish tagged build to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/VoxelCraftSurvival-Windows-x64.zip \
            --title "VoxelCraft Survival ${GITHUB_REF_NAME}" \
            --generate-notes
