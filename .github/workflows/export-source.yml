name: Export Patched Source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ARCHIVE_SHA256: c8e4d1a49159a5338724cd161fa7d299613e96382396ad3c282f02e6e3121372

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct patched project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/source
          cat source/chunks/part-*.b64 | tr -d '\r\n' | base64 --decode > .ci/voxelcraft-native.zip
          echo "${PROJECT_ARCHIVE_SHA256}  .ci/voxelcraft-native.zip" | sha256sum --check
          unzip -q .ci/voxelcraft-native.zip -d .ci/source
          project_file="$(find .ci/source -type f -name project.godot -print -quit)"
          project_dir="$(dirname "${project_file}")"
          patch -d "${project_dir}" -p1 < source/patches/runtime-blank-screen.patch
          mkdir -p build
          tar -C "${project_dir}" -czf build/voxelcraft-native-patched-source.tar.gz .
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: VoxelCraft-Patched-Source
          path: build/voxelcraft-native-patched-source.tar.gz
          if-no-files-found: error
          retention-days: 7
